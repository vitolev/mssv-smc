name: 2_regime_T_500

T: 500           # Number of time steps to use from the synthetic dataset
K: 2              # Number of regimes
N: 2000           # Number of particles for the BPF

pmmh:
  M: 10000        # Number of PMMH iterations
  C: 8            # Number of parallel chains  
  burnin: 5000    # Number of burn-in iterations to discard from the PMMH output

prior:           # prior parameters for the model
  mu_mean: 0.0
  mu_sd: 5.0
  phi_a: 6
  phi_b: 2
  sigma_eta_a: 2.0
  sigma_eta_b: 5.0
  diff_mean: 0.0
  diff_sd: 2.0
  P_diag: 3.5
  P_base: 1.5

proposal:         # step sizes for the random walk proposal in PMMH
  step_mu: 0.2
  step_phi: 0.1
  step_sigma: 0.1
  step_P: 400
  step_delta: 0.15
  